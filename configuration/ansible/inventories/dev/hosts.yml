# VM names must match a Host entry in ~/.ssh/config.d/ on the controller.
# Connection details (HostName/IP, User, IdentityFile) are defined there
# and intentionally kept out of the repository.
# Alternatively, a connection can be specified as <host-name> ansible_host=<IP>
[vms]
devops-vm

[vms:vars]
ansible_python_interpreter=/usr/bin/python3

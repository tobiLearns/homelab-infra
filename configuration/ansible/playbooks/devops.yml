---
- name: Setup DevOps Workstation
  hosts: vms
  become: true
  # Collections: Specifies which Ansible collection namespaces to search for modules.
  # By declaring ansible.builtin here, we can use short module names (e.g., "apt:")
  # instead of full names (e.g., "ansible.builtin.apt:") throughout the playbook.
  collections:
    - ansible.builtin

  pre_tasks:
    - name: Ensure Ansible remote_tmp directory exists for root
      file:
        path: /root/.ansible/tmp
        state: directory
        mode: '0700'

    - name: Check if secrets file exists (on controller)
      stat:
        path: "{{ playbook_dir }}/../vars/secrets.yml"
      register: _secrets_file
      delegate_to: localhost
      become: false

    - name: Load local secrets
      include_vars:
        file: "{{ playbook_dir }}/../vars/secrets.yml"
      when: _secrets_file.stat.exists

  # Ansible resolves the full dependency graph of all listed roles before executing
  # anything, which guarantees correct ordering and de-duplication across all feature
  # roles (e.g. profiles/basic is pulled in by both profiles/desktop and profiles/devops
  # but will only run once).
  roles:
    - profiles/desktop
    - profiles/devops
    - features/user_config
    - features/nfs_mounts

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          ============================================
          DevOps Workstation Setup Complete!
          ============================================

          Installed:
          - Desktop: XFCE (via Proxmox Console)
          - IDEs: IntelliJ IDEA {{ intellij_version }}, VS Code
          - IaC: Terraform, Ansible
          - Container: Docker
          - K8s CLI: kubectl, helm, k9s
          - Git: Configured

          VNC Access (backup):
          - Port: 5901
          - Password: see vars/secrets.yml
          - Command: vncviewer <vm-ip>:5901

          Workspace: ~/workspace/

          Next steps:
          1. Reboot: sudo reboot
          2. Login to XFCE desktop
          3. Clone your repos to ~/workspace/
          4. Start coding!

          To connect to Kubernetes cluster later:
          - Copy kubeconfig: scp k8s-master:/etc/rancher/k3s/k3s.yaml ~/.kube/config
          - Test: kubectl get nodes
          ============================================

---
# Install VS Code when `install_vscode` is true
- name: Remove conflicting VS Code apt source files
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/vscode.list
    - /usr/share/keyrings/microsoft.gpg
    - /usr/share/keyrings/microsoft-archive-keyring.gpg
  become: true
  when: install_vscode

- name: Download Microsoft GPG key (armored)
  get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft.asc
    mode: '0644'
  become: true
  when: install_vscode

- name: Dearmor Microsoft GPG key
  shell: gpg --dearmor --yes -o /etc/apt/keyrings/microsoft.gpg /tmp/microsoft.asc
  args:
    creates: /etc/apt/keyrings/microsoft.gpg
  become: true
  when: install_vscode

- name: Add VS Code repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main"
    state: present
    filename: vscode
  become: true
  when: install_vscode

- name: Install VS Code
  apt:
    name: code
    state: present
    update_cache: true
  when: install_vscode

- name: Install VS Code extensions
  become: true
  become_user: "{{ workstation_user }}"
  environment:
    HOME: "{{ user_home }}"
  command: code --install-extension {{ item }}
  loop: "{{ ide_vscode_extensions }}"
  register: ide_vscode_ext_result
  changed_when: "'already installed' not in ide_vscode_ext_result.stderr | default('')"
  failed_when: "ide_vscode_ext_result.rc not in [0, 1]"
  when: install_vscode

# Install IntelliJ IDEA when `install_intellij` is true
# WARNING: JetBrains does not provide an apt repository for IntelliJ IDEA.
# Installed from JetBrains CDN tarball. Update `intellij_version` in playbook vars to upgrade.
- name: Create IntelliJ directory
  file:
    path: /opt/intellij
    state: directory
    mode: '0755'
  when: install_intellij

- name: Check if IntelliJ is already installed
  stat:
    path: /opt/intellij/bin/idea.sh
  register: _intellij_installed
  when: install_intellij

- name: Download IntelliJ IDEA
  get_url:
    url: "https://download.jetbrains.com/idea/ideaIC-{{ intellij_version }}.tar.gz"
    dest: "/tmp/intellij.tar.gz"
    mode: '0644'
  when: install_intellij and not _intellij_installed.stat.exists

- name: Extract IntelliJ
  unarchive:
    src: "/tmp/intellij.tar.gz"
    dest: /opt/intellij
    remote_src: true
    extra_opts: [--strip-components=1]
    creates: /opt/intellij/bin/idea.sh
  when: install_intellij and not _intellij_installed.stat.exists

- name: Create IntelliJ desktop entry
  copy:
    dest: /usr/share/applications/intellij-idea.desktop
    content: |
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=IntelliJ IDEA
      Icon=/opt/intellij/bin/idea.png
      Exec=/opt/intellij/bin/idea.sh %f
      Comment=Java IDE
      Categories=Development;IDE;
      Terminal=false
    mode: '0644'
  when: install_intellij

- name: Create IntelliJ symlink
  file:
    src: /opt/intellij/bin/idea.sh
    dest: /usr/local/bin/idea
    state: link
  when: install_intellij

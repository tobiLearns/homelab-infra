---
install_vscode: true
install_intellij: true
intellij_version: "2026.1.2"
# JetBrains merged Community and Ultimate into a single download as of 2026.x.
# Old pattern: ideaIC-{version}.tar.gz — no longer valid.
# Verify the current URL at: jetbrains.com/idea/download/other.html
intellij_download_url: "https://download.jetbrains.com/idea/idea-{{ intellij_version }}.tar.gz"

ide_vscode_extensions:
  - hashicorp.terraform
  - redhat.ansible
  - ms-azuretools.vscode-docker
  - ms-kubernetes-tools.vscode-kubernetes-tools
  - eamodio.gitlens

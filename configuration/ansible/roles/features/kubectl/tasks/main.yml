---
- name: Add Kubernetes GPG key
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key
    dest: /tmp/kubernetes.asc
    mode: '0644'
  become: true

- name: Dearmor Kubernetes GPG key
  shell: gpg --dearmor < /tmp/kubernetes.asc > /etc/apt/keyrings/kubernetes.gpg
  args:
    creates: /etc/apt/keyrings/kubernetes.gpg
  become: true

- name: Add Kubernetes repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /"
    state: present
    filename: kubernetes
  become: true

- name: Install kubectl
  apt:
    name: kubectl
    state: present
    update_cache: true

# WARNING: Helm has no reliable apt package. Installed from official get.helm.sh tarball.
# To upgrade: update kubernetes_helm_version in defaults/main.yml and remove /usr/local/bin/helm.
- name: Download and install Helm
  unarchive:
    src: "https://get.helm.sh/helm-{{ kubernetes_helm_version }}-linux-amd64.tar.gz"
    dest: /usr/local/bin/
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "linux-amd64/helm"
    creates: /usr/local/bin/helm
  become: true

# WARNING: k9s has no apt package. Installed from GitHub releases tarball.
# To upgrade: update kubernetes_k9s_version in defaults/main.yml and remove /usr/local/bin/k9s.
- name: Download and install k9s
  unarchive:
    src: "{{ kubernetes_k9s_url }}"
    dest: /usr/local/bin/
    remote_src: true
    creates: /usr/local/bin/k9s

- name: Create .kube directory
  file:
    path: "{{ user_home }}/.kube"
    state: directory
    owner: "{{ workstation_user }}"
    mode: '0700'

---
- name: Install VNC Server packages
  apt:
    name: "{{ vnc_packages }}"
    state: present
  when: enable_vnc

- name: Setup VNC for user - create .vnc directory
  file:
    path: "{{ user_home }}/.vnc"
    state: directory
    owner: "{{ workstation_user }}"
    mode: '0755'
  when: enable_vnc

- name: Check if VNC password is already configured
  stat:
    path: "{{ user_home }}/.vnc/passwd"
  register: _vnc_passwd_file
  when: enable_vnc

- name: Generate and set VNC password file
  shell: |
    echo "{{ vnc_password }}" | vncpasswd -f > "{{ user_home }}/.vnc/passwd"
    chmod 0600 "{{ user_home }}/.vnc/passwd"
  become: true
  become_user: "{{ workstation_user }}"
  changed_when: true
  no_log: true
  when: enable_vnc and not (_vnc_passwd_file.stat.exists | default(false))

- name: Create VNC xstartup
  copy:
    dest: "{{ user_home }}/.vnc/xstartup"
    content: |
      #!/bin/bash
      unset SESSION_MANAGER
      unset DBUS_SESSION_BUS_ADDRESS
      export XKL_XMODMAP_DISABLE=1
      exec dbus-launch --exit-with-session startxfce4
    owner: "{{ workstation_user }}"
    mode: '0755'
  when: enable_vnc
  notify: Restart VNC service

- name: Create VNC systemd service file
  copy:
    dest: /etc/systemd/system/vncserver@.service
    content: |
      [Unit]
      Description=Start TigerVNC server at startup
      After=syslog.target network.target

      [Service]
      Type=forking
      User={{ workstation_user }}
      Group={{ workstation_user }}
      WorkingDirectory={{ user_home }}

      ExecStartPre=-/usr/bin/vncserver -kill :%i
      ExecStart=/usr/bin/vncserver -depth {{ vnc_depth }} -geometry {{ vnc_geometry }} -localhost no :%i
      ExecStop=/usr/bin/vncserver -kill :%i

      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
    mode: '0644'
  when: enable_vnc
  notify:
    - Reload systemd daemon
    - Restart VNC service

- name: Enable and start VNC service
  systemd:
    name: "vncserver@{{ vnc_display }}"
    enabled: true
    state: started
  when: enable_vnc

---
# Role: snap_removal
# Tasks extracted from the playbook to remove snap and add alternative repos

- name: Remove all snap packages
  shell: snap list | awk 'NR>1 {print $1}' | xargs -r -n1 snap remove --purge
  ignore_errors: true
  failed_when: false

- name: Remove snapd completely
  apt:
    name:
      - snapd
      - gnome-software-plugin-snap
    state: absent
    purge: true
  ignore_errors: true

- name: Remove snap directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /snap
    - /var/snap
    - /var/lib/snapd
    - /var/cache/snapd
    - /usr/lib/snapd
  ignore_errors: true

- name: Hold snapd package (prevent reinstall)
  dpkg_selections:
    name: snapd
    selection: hold
  ignore_errors: true

- name: Add Mozilla Team PPA (native Firefox alternative to snap)
  apt_repository:
    repo: ppa:mozillateam/ppa
    state: present

- name: Set Firefox PPA priority
  copy:
    dest: /etc/apt/preferences.d/mozilla-firefox
    content: |
      Package: *
      Pin: release o=LP-PPA-mozillateam
      Pin-Priority: 1001
    mode: '0644'

- name: Configure unattended upgrades for Firefox
  copy:
    dest: /etc/apt/apt.conf.d/51unattended-upgrades-firefox
    content: |
      Unattended-Upgrade::Allowed-Origins:: "LP-PPA-mozillateam:${distro_codename}";
    mode: '0644'

- name: Update apt cache after adding PPAs
  apt:
    update_cache: true

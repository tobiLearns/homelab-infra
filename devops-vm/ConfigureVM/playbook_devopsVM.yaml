---
# devops-workstation-playbook.yml
# Minimales Setup für DevOps-Arbeit mit Desktop
# KEIN Node.js, KEIN ML-Zeug, nur IaC-fokussiert

- name: Setup DevOps Workstation
  hosts: all
  become: true
  # Collections: Specifies which Ansible collection namespaces to search for modules.
  # By declaring ansible.builtin here, we can use short module names (e.g., "apt:")
  # instead of full names (e.g., "ansible.builtin.apt:") throughout the playbook.
  collections:
    - ansible.builtin

  vars:
    user_home: "/home/{{ workstation_user }}"

    # IDE Configuration
    install_intellij: true
    install_vscode: true
    intellij_version: "2024.2.4"

    # VNC Configuration (Backup-Zugriff)
    enable_vnc: true

  tasks:
    - name: Load local secrets (optional)
      include_vars:
        file: vars/secrets.yml

    # ============================================
    # 1. SYSTEM BASICS
    # ============================================
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    # ============================================
    # SNAP REMOVAL & ALTERNATIVE REPOS (moved to role)
    # (Can be removed as a block if snap is desired)
    # ============================================
    - name: Remove snap and configure PPAs
      import_role:
        name: snap_removal
    # ============================================

    - name: Install essential packages
      apt:
        name:
          - build-essential
          - curl
          - wget
          - git
          - vim
          - tmux
          - htop
          - tree
          - jq
          - unzip
          - apt-transport-https
          - ca-certificates
          - gnupg
          - software-properties-common
        state: present

    # ============================================
    # USER CONFIGURATION
    # ============================================
    - name: Set proper display name for user (fix screensaver display)
      user:
        name: "{{ workstation_user }}"
        comment: "{{ workstation_user }}"
        state: present

    # ============================================
    # 2. DESKTOP ENVIRONMENT (XFCE)
    # ============================================
    - name: Install XFCE Desktop and applications
      apt:
        name:
          - xfce4
          - xfce4-goodies
          - xfce4-terminal
          - lightdm
          - firefox          # Will use Mozilla PPA if configured above
          - thunar
          - mousepad
          - gnome-themes-extra
        state: present

    - name: Set LightDM as default display manager
      copy:
        dest: /etc/X11/default-display-manager
        content: "/usr/sbin/lightdm\n"
        mode: '0644'

    - name: Enable LightDM display manager (but don't start yet)
      systemd:
        name: lightdm
        enabled: true
      # Nicht starten - erst beim Reboot!

    - name: Set graphical target as default
      file:
        src: /lib/systemd/system/graphical.target
        dest: /etc/systemd/system/default.target
        state: link
        force: true

    - name: Install VNC Server
      apt:
        name:
          - tigervnc-standalone-server
          - tigervnc-common
        state: present
      when: enable_vnc

    - name: Setup VNC for user
      when: enable_vnc
      block:
        - name: Create VNC directory
          file:
            path: "{{ user_home }}/.vnc"
            state: directory
            owner: "{{ workstation_user }}"
            mode: '0755'

        - name: Generate VNC password hash
          command: vncpasswd -f
          args:
            stdin: "{{ vnc_password }}"
          register: vnc_password_hash
          changed_when: false
          become: true
          become_user: "{{ workstation_user }}"

        - name: Set VNC password file
          copy:
            content: "{{ vnc_password_hash.stdout }}"
            dest: "{{ user_home }}/.vnc/passwd"
            mode: '0600'
            owner: "{{ workstation_user }}"
          become: true
          become_user: "{{ workstation_user }}"

        - name: Create VNC xstartup
          copy:
            dest: "{{ user_home }}/.vnc/xstartup"
            content: |
              #!/bin/bash
              unset SESSION_MANAGER
              unset DBUS_SESSION_BUS_ADDRESS
              exec startxfce4
            owner: "{{ workstation_user }}"
            mode: '0755'

    - name: Create VNC systemd service
      copy:
        dest: /etc/systemd/system/vncserver@.service
        content: |
          [Unit]
          Description=Start TigerVNC server at startup
          After=syslog.target network.target

          [Service]
          Type=forking
          User={{ workstation_user }}
          Group={{ workstation_user }}
          WorkingDirectory={{ user_home }}

          ExecStartPre=-/usr/bin/vncserver -kill :%i > /dev/null 2>&1
          ExecStart=/usr/bin/vncserver -depth 24 -geometry 1920x1080 -localhost no :%i
          ExecStop=/usr/bin/vncserver -kill :%i

          # Auto-Restart bei Crash oder Logout
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      when: enable_vnc

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true
      when: enable_vnc

    - name: Enable and start VNC service
      systemd:
        name: "vncserver@1"
        enabled: true
        state: started
      when: enable_vnc

    # ============================================
    # 3. GIT & VERSION CONTROL
    # ============================================
    - name: Apply Git role
      import_role:
        name: git

    # ============================================
    # 4. IaC TOOLS (Terraform & Ansible)
    # ============================================
    - name: Apply IaC Tools role
      import_role:
        name: iac_tools

    # ============================================
    # 5. DOCKER
    # ============================================
    - name: Install Docker
      import_role:
        name: docker

    # ============================================
    # 6. KUBERNETES CLI TOOLS
    # ============================================
    - name: Add Kubernetes GPG key
      apt_key:
        url: https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key
        state: present

    - name: Add Kubernetes repository
      apt_repository:
        repo: "deb https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes

    - name: Install kubectl
      apt:
        name: kubectl
        state: present
        update_cache: true

    - name: Install Helm
      block:
        - name: Download Helm installation script
          get_url:
            url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
            dest: /tmp/get-helm-3
            mode: '0755'

        - name: Run Helm installation script
          command: /tmp/get-helm-3
          args:
            creates: /usr/local/bin/helm

    - name: Download and install k9s
      unarchive:
        src: https://github.com/derailed/k9s/releases/latest/download/k9s_Linux_amd64.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        creates: /usr/local/bin/k9s

    - name: Create .kube directory
      file:
        path: "{{ user_home }}/.kube"
        state: directory
        owner: "{{ workstation_user }}"
        mode: '0700'

    # ============================================
    # 7. IDEs
    # ============================================
    - name: Install IDEs (VS Code, IntelliJ)
      import_role:
        name: ide

    # ============================================
    # 8. USER CONFIGURATION
    # ============================================
    - name: Create workspace directories
      file:
        path: "{{ user_home }}/{{ item }}"
        state: directory
        owner: "{{ workstation_user }}"
        mode: '0755'
      loop:
        - workspace
        - workspace/terraform
        - workspace/ansible
        - workspace/kubernetes
        - workspace/scripts

    - name: Configure bash aliases
      blockinfile:
        path: "{{ user_home }}/.bashrc"
        block: |
          # DevOps aliases
          alias tf='terraform'
          alias tfp='terraform plan'
          alias tfa='terraform apply'
          alias tfd='terraform destroy'
          alias k='kubectl'
          alias kgp='kubectl get pods'
          alias kgs='kubectl get svc'
          alias d='docker'
          alias dc='docker compose'
          alias ll='ls -lah'
          alias gs='git status'

          # Colored prompt
          export PS1='\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '
        marker: "# {mark} ANSIBLE MANAGED"
        create: true
        mode: '0644'
        owner: "{{ workstation_user }}"

    - name: Configure vim
      copy:
        dest: "{{ user_home }}/.vimrc"
        content: |
          set number
          set expandtab
          set tabstop=2
          set shiftwidth=2
          syntax on
          set background=dark
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure tmux
      copy:
        dest: "{{ user_home }}/.tmux.conf"
        content: |
          set -g mouse on
          set -g base-index 1
          setw -g pane-base-index 1
          bind | split-window -h
          bind - split-window -v
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Create XFCE config directory
      file:
        path: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml"
        state: directory
        owner: "{{ workstation_user }}"
        mode: '0755'

    - name: Disable XFCE screensaver and lock
      copy:
        dest: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-screensaver.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-screensaver" version="1.0">
            <property name="saver" type="empty">
              <property name="enabled" type="bool" value="false"/>
              <property name="mode" type="int" value="0"/>
            </property>
            <property name="lock" type="empty">
              <property name="enabled" type="bool" value="false"/>
            </property>
          </channel>
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure XFCE window manager (dark theme, workspaces)
      copy:
        dest: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfwm4" version="1.0">
            <property name="general" type="empty">
              <property name="theme" type="string" value="Default-xhdpi"/>
              <property name="workspace_count" type="int" value="6"/>
              <property name="workspace_names" type="array">
                <value type="string" value="Workspace 1"/>
                <value type="string" value="Workspace 2"/>
                <value type="string" value="Workspace 3"/>
                <value type="string" value="Workspace 4"/>
                <value type="string" value="Workspace 5"/>
                <value type="string" value="Workspace 6"/>
              </property>
            </property>
          </channel>
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure XFCE desktop (dark theme)
      copy:
        dest: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xsettings" version="1.0">
            <property name="Net" type="empty">
              <property name="ThemeName" type="string" value="Adwaita-dark"/>
              <property name="IconThemeName" type="string" value="Adwaita"/>
            </property>
            <property name="Gtk" type="empty">
              <property name="ColorScheme" type="string" value="prefer-dark"/>
            </property>
          </channel>
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Create panel launchers directory
      file:
        path: "{{ user_home }}/.config/xfce4/panel/launcher-{{ item.id }}"
        state: directory
        owner: "{{ workstation_user }}"
        mode: '0755'
      loop:
        - { id: "15" }
        - { id: "16" }
        - { id: "17" }

    - name: Configure Firefox launcher
      copy:
        dest: "{{ user_home }}/.config/xfce4/panel/launcher-15/firefox.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Firefox
          Exec=firefox
          Icon=firefox
          Terminal=false
          Categories=Network;WebBrowser;
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure Thunar launcher
      copy:
        dest: "{{ user_home }}/.config/xfce4/panel/launcher-16/thunar.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Thunar File Manager
          Exec=thunar
          Icon=system-file-manager
          Terminal=false
          Categories=System;FileManager;
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure Terminal launcher
      copy:
        dest: "{{ user_home }}/.config/xfce4/panel/launcher-17/terminal.desktop"
        content: |
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Terminal
          Exec=xfce4-terminal
          Icon=utilities-terminal
          Terminal=false
          Categories=System;TerminalEmulator;
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure XFCE panel with launchers
      copy:
        dest: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-panel" version="1.0">
            <property name="panels" type="array">
              <value type="int" value="1"/>
              <property name="panel-1" type="empty">
                <property name="position" type="string" value="p=6;x=0;y=0"/>
                <property name="size" type="uint" value="26"/>
                <property name="plugin-ids" type="array">
                  <value type="int" value="1"/>
                  <value type="int" value="15"/>
                  <value type="int" value="16"/>
                  <value type="int" value="17"/>
                  <value type="int" value="3"/>
                  <value type="int" value="4"/>
                  <value type="int" value="5"/>
                  <value type="int" value="6"/>
                </property>
              </property>
            </property>
            <property name="plugins" type="empty">
              <property name="plugin-1" type="string" value="applicationsmenu"/>
              <property name="plugin-3" type="string" value="separator">
                <property name="expand" type="bool" value="true"/>
                <property name="style" type="uint" value="0"/>
              </property>
              <property name="plugin-4" type="string" value="pager">
                <property name="rows" type="uint" value="2"/>
                <property name="miniature-view" type="bool" value="true"/>
              </property>
              <property name="plugin-5" type="string" value="separator">
                <property name="style" type="uint" value="0"/>
              </property>
              <property name="plugin-6" type="string" value="clock"/>
              <property name="plugin-15" type="string" value="launcher">
                <property name="items" type="array">
                  <value type="string" value="firefox.desktop"/>
                </property>
              </property>
              <property name="plugin-16" type="string" value="launcher">
                <property name="items" type="array">
                  <value type="string" value="thunar.desktop"/>
                </property>
              </property>
              <property name="plugin-17" type="string" value="launcher">
                <property name="items" type="array">
                  <value type="string" value="terminal.desktop"/>
                </property>
              </property>
            </property>
          </channel>
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Configure workspace switcher (2 rows x 3 columns)
      copy:
        dest: "{{ user_home }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml"
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="desktop-icons" type="empty">
              <property name="style" type="int" value="0"/>
            </property>
          </channel>
        owner: "{{ workstation_user }}"
        mode: '0644'

    - name: Create GTK-3.0 config directory
      file:
        path: "{{ user_home }}/.config/gtk-3.0"
        state: directory
        owner: "{{ workstation_user }}"
        mode: '0755'

    - name: Set GTK dark theme preference globally
      copy:
        dest: "{{ user_home }}/.config/gtk-3.0/settings.ini"
        content: |
          [Settings]
          gtk-application-prefer-dark-theme=1
          gtk-theme-name=Adwaita-dark
          gtk-icon-theme-name=Adwaita
        owner: "{{ workstation_user }}"
        mode: '0644'

    # ============================================
    # 9. USEFUL CLI TOOLS
    # ============================================
    - name: Install additional CLI tools
      apt:
        name:
          - ncdu         # Disk usage analyzer
          - ripgrep      # Better grep
          - fd-find      # Better find
          - bat          # Better cat
          - net-tools    # ifconfig, netstat
          - dnsutils     # dig, nslookup
          - iputils-ping
        state: present

    - name: Set memlock limits for better application compatibility
      lineinfile:
        path: /etc/security/limits.conf
        line: "{{ item }}"
        create: true
        mode: '0644'
      loop:
        - "* soft memlock unlimited"
        - "* hard memlock unlimited"

  post_tasks:
    - name: Display completion message
      debug:
        msg: |
          ============================================
          ✅ DevOps Workstation Setup Complete!
          ============================================

          Installed:
          - Desktop: XFCE (via Proxmox Console)
          - IDEs: IntelliJ IDEA, VS Code
          - IaC: Terraform, Ansible
          - Container: Docker
          - K8s CLI: kubectl, helm, k9s
          - Git: Configured

          VNC Access (backup):
          - Port: 5901
          - Password: {{ vnc_password }}
          - Command: vncviewer <vm-ip>:5901

          Workspace: ~/workspace/

          Next steps:
          1. Reboot: sudo reboot
          2. Login to XFCE desktop
          3. Clone your repos to ~/workspace/
          4. Start coding!

          To connect to Kubernetes cluster later:
          - Copy kubeconfig: scp k8s-master:/etc/rancher/k3s/k3s.yaml ~/.kube/config
          - Test: kubectl get nodes
          ============================================

---
# tasks file for iac_tools role
# Install and configure Terraform and Ansible

- name: Add HashiCorp GPG key
  get_url:
    url: https://apt.releases.hashicorp.com/gpg
    dest: /etc/apt/keyrings/hashicorp.asc
    mode: '0644'
  become: true

- name: Add HashiCorp repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ 'noble' if ansible_distribution_release == 'resolute' else ansible_distribution_release }} main"
    state: present
    filename: hashicorp
  become: true

- name: Install Terraform
  apt:
    name: terraform
    state: present
    update_cache: true

- name: Install Python for Ansible
  apt:
    name: "{{ iac_tools_python_packages }}"
    state: present
  become: true

- name: Install Ansible via apt
  apt:
    name: "{{ iac_tools_ansible_packages }}"
    state: present
  become: true

